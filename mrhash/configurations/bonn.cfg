# ============================================================
# Integrated Configuration: DROID-W + Dynamic 3DGS
# For TUM RGB-D datasets
# ============================================================

# ---- Dataset Paths ----
data_path: /home/robin/datasets/Bonn/rgbd_bonn_person_tracking2
results_path: /home/robin/datasets/Bonn/rgbd_bonn_person_tracking2/integrated_results

# Scene name (used for DROID-W output subdirectory)
scene: walking_static

# ---- Pose Source ----
# Set to true to use GT poses from groundtruth.txt instead of DROID-W estimated poses
use_gt_pose: false

# ---- Online Mode ----
# When true, DROID-W tracking and 3DGS mapping run simultaneously frame-by-frame.
# When false (default), DROID-W runs fully first, then 3DGS mapping runs on all frames.
online_mode: true

# Maximum frame to process (-1 = all frames)
end_frame: -1

# ---- Dynamic 3DGS (MRHash) Map Configuration ----
map:
    sdf_truncation            : 0.1
    sdf_truncation_scale      : 0.00
    integration_weight_sample : 1
    virtual_voxel_size        : 0.01
    n_frames_invalidate_voxels: 100
    # Master switch: enable/disable dynamic object handling
    dynamic_detection         : true
    # Dynamic object handling method (only used when dynamic_detection is true):
    #   "tsdf_residual"        - Original method: detect dynamic objects via TSDF residual
    #   "droidw_uncertainty"   - Use DROID-W per-pixel uncertainty map as dynamic mask
    dynamic_method            : "droidw_uncertainty"
    dynamic_erosion_size      : 15
    dynamic_dilation_size     : 10
    dynamic_flood_threshold   : 0.007
    # Uncertainty threshold for droidw_uncertainty method (0-1).
    # Pixels with mask value below this are considered dynamic.
    droidw_uncertainty_threshold: 0.8
    # Dilation radius (pixels) for uncertainty mask to expand dynamic regions.
    # 0 = no dilation. Recommended: 10-15.
    droidw_uncertainty_dilation: 10
    save_dynamic_mask         : true
    gs_only_dynamic_frames    : false
    gs_visualize              : true
    # When true, only DROID-W keyframes are passed to TSDF/3DGS mapping
    # (non-keyframes are skipped entirely). Only effective when use_gt_pose=false.
    map_keyframes_only        : true

streamer:
    voxel_extents_scale       : 1

mesh:
    marching_cubes_threshold  : 2
    min_weight_threshold      : 1
    sdf_var_threshold         : 0
    vertices_merging_threshold: 0

# ---- Sensor / Camera Parameters (shared by both pipelines) ----
sensor:
    min_depth     : 0.1
    max_depth     : 20.0
    # TUM Fr3 intrinsics (walking_halfsphere / walking_xyz / walking_static)
    intrinsics    : [535.4, 539.2, 320.1, 247.6]
    resolution    : [640, 480]
    depth_scaling : 5000.0
    hz            : 30

# ---- Dynamic 3DGS Gaussian Splatting Parameters ----
gs_optimization_param_path: ./mrhash/configurations/params.json

# ---- DROID-W Configuration ----
droidw:
    # General
    verbose       : true
    device        : "cuda:0"
    setup_seed    : 43
    fast_mode     : true
    stride        : 1
    max_frames    : -1
    save_gt_poses : true

    # Camera output size (DROID-W internal processing resolution)
    cam_H_edge: 8
    cam_W_edge: 8
    cam_H_out : 384
    cam_W_out : 512

    # Mono depth prior model (REMOVED: using dataset depth instead)
    # The metric depth estimator is no longer loaded; dataset depth images
    # are passed directly to the tracking pipeline.
    mono_prior:
        depth             : 'none'
        save_depth        : false
        feature_extractor : 'dinov2_reg_small_fine'
        save_feature      : false

    # Trajectory filler (currently disabled)
    traj_filler:
        use_dino_features : false

    # Tracking configuration
    tracking:
        pretrained: pretrained/droid.pth
        buffer    : 350
        beta      : 0.75
        warmup    : 12
        max_age   : 50
        mono_thres: 0.1
        motion_filter:
            thresh: 3.0
        multiview_filter:
            thresh     : 0.01
            visible_num: 2
        frontend:
            enable_loop       : false
            enable_online_ba  : false
            keyframe_thresh   : 3.0
            thresh            : 16.0
            window            : 25
            radius            : 2
            nms               : 1
            max_factors       : 75
            enable_opt_dyn_mask: true
        backend:
            final_ba      : false
            ba_freq       : 20
            thresh        : 25.0
            radius        : 1
            nms           : 5
            loop_window   : 25
            loop_thresh   : 25.0
            loop_radius   : 1
            loop_nms      : 10
            metric_depth_reg: true
            normalize     : false
        uncertainty_params:
            feature_dim              : 384
            activate                 : true
            visualize                : false
            gamma_data               : 0.1
            gamma_prior              : 0.05
            gamma_depth              : 0.001
            lr                       : 0.1
            weight_decay             : 0.002
            gba_lr                   : 0.1
            gba_weight_decay         : 0.002
            enable_affine_transform  : true
            enable_bidirectional_uncer: false
        force_keyframe_every_n_frames: 9
        nb_ref_frame_metric_depth_filtering: 6
